<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeowMesh — Daily Ops Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #FBF6EC; color: #23201A; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    h1,h2,h3,h4 { font-family: 'Fraunces', serif; margin: 0; }
    @keyframes pop { from { transform: scale(.97); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .page { max-width: 960px; margin: 0 auto; padding: 0 20px 64px; animation: pop .3s ease; }

    /* Header */
    .topbar { background: #F3EADB; border-bottom: 1px solid #E2D6C2; margin-bottom: 32px; }
    .topbar-inner { max-width: 960px; margin: 0 auto; padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12; flex-wrap: wrap; }
    .topbar-brand { display: flex; align-items: center; gap: 10; }
    .topbar-brand h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    .topbar-brand span.clay { color: #C8553D; }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; border: 1px solid; }
    .status-badge.live   { background: #EAF1EC; border-color: #CFE0D4; color: #3D6B4F; }
    .status-badge.sample { background: #FEF3EF; border-color: #F5C9BB; color: #A8422F; }
    .status-badge .dot { width: 7px; height: 7px; border-radius: 50%; }
    .status-badge.live   .dot { background: #4F7060; }
    .status-badge.sample .dot { background: #C8553D; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .date-label { font-size: 14px; color: #6B6255; }
    .btn-refresh { all: unset; cursor: pointer; font-size: 13px; font-weight: 600; color: #6B6255; padding: 7px 14px; border-radius: 999px; border: 1px solid #E2D6C2; background: #fff; transition: background .15s; }
    .btn-refresh:hover { background: #F3EADB; }

    /* Section headers */
    .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #6B6255; margin: 0 0 14px; padding-bottom: 8px; border-bottom: 1px solid #E2D6C2; }

    /* Cards */
    .card { background: #fff; border: 1px solid #E2D6C2; border-radius: 16px; padding: 18px 20px; }
    .card-sm { background: #fff; border: 1px solid #E2D6C2; border-radius: 14px; padding: 14px 16px; }

    /* KPI tiles */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 24px; }
    .kpi { background: #fff; border: 1px solid #E2D6C2; border-radius: 14px; padding: 14px 16px; border-top: 3px solid; }
    .kpi .kpi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #6B6255; margin-bottom: 5px; }
    .kpi .kpi-val { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; color: #23201A; line-height: 1.1; }
    .kpi .kpi-sub { font-size: 11px; color: #6B6255; margin-top: 3px; }

    /* Row layout */
    .row { display: grid; gap: 16px; }
    .row-2 { grid-template-columns: 1fr 1fr; }
    .row-3 { grid-template-columns: 1fr 1fr 1fr; }

    /* Tables inside cards */
    .item-list { display: grid; gap: 0; }
    .item-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #F3EADB; }
    .item-row:last-child { border-bottom: none; padding-bottom: 0; }
    .item-row:first-child { padding-top: 0; }
    .item-name { flex: 1; font-size: 14px; color: #23201A; }
    .item-val  { font-size: 13px; font-weight: 600; color: #23201A; font-family: 'Fraunces', serif; }
    .item-sub  { font-size: 11px; color: #6B6255; min-width: 40px; text-align: right; }

    /* Stage pill */
    .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .pill-amber  { background: #FEF3C7; color: #92400E; }
    .pill-blue   { background: #DBEAFE; color: #1E40AF; }
    .pill-green  { background: #EAF1EC; color: #3D6B4F; }

    /* Payout breakdown */
    .payout-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #F3EADB; font-size: 14px; }
    .payout-row:last-child { border-bottom: none; padding-bottom: 0; font-weight: 700; font-size: 15px; }
    .payout-row:first-child { padding-top: 0; }
    .payout-neg { color: #C8553D; }
    .payout-total { color: #4F7060; font-family: 'Fraunces', serif; font-size: 17px; }

    /* Channels / stages bar */
    .bar-row { margin-bottom: 10px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
    .bar-track { height: 6px; background: #F3EADB; border-radius: 999px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 999px; transition: width .4s; }

    /* Divider between major sections */
    .section-gap { margin-bottom: 32px; }

    /* Ads campaign table */
    .camp-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #F3EADB; }
    .camp-row:last-child { border-bottom: none; padding-bottom: 0; }
    .camp-row:first-child { padding-top: 0; }
    .camp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .camp-name { flex: 1; font-size: 13px; color: #23201A; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .camp-amt  { font-size: 13px; font-weight: 600; color: #23201A; white-space: nowrap; }

    @media (max-width: 620px) {
      .row-2, .row-3 { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-brand">
      <span style="font-size:24px">🐾</span>
      <h1>MeowMesh <span class="clay">Ops</span></h1>
    </div>
    <div class="topbar-right">
      <span class="date-label" id="dateLine">—</span>
      <span class="status-badge sample" id="statusBadge">
        <span class="dot"></span>
        <span id="statusText">Sample data</span>
      </span>
      <button class="btn-refresh" id="btnRefresh">⟳ Refresh</button>
    </div>
  </div>
</div>

<div class="page" id="page">
  <!-- rendered by JS -->
</div>

<!-- ─── SAMPLE DATA ──────────────────────────────────────────────────────── -->
<script>
const SAMPLE_DATA = {
  meta: {
    date: "Fri, 20 Jun 2026",
    generatedAt: "09:14",
    live: false,
    currency: "৳"
  },

  orders: {
    totalSales: 18575,
    orderCount: 11,
    itemCount: 27,
    products: [
      { name: "Meow Litter Box (Standard)",  qty: 8,  revenue: 9600  },
      { name: "Meow Litter Box (Premium)",   qty: 5,  revenue: 8975  },
    ],
    channels: [
      { name: "Facebook",  orders: 7, revenue: 12150 },
      { name: "Website",   orders: 3, revenue: 5825  },
      { name: "Reseller",  orders: 1, revenue: 600   },
    ],
    stages: [
      { name: "Processing",  orders: 4, amount: 6700  },
      { name: "In Courier",  orders: 5, amount: 8075  },
      { name: "Delivered",   orders: 2, amount: 3800  },
    ]
  },

  steadfast: {
    deliveredToday: { parcels: 9, cod: 19800 },
    payout: { shipping: 1800, codFee: 198, returns: 0, netInHand: 17802 },
    balanceAvailable: 47300
  },

  ads: {
    spendToday: 14.80,
    campaigns: [
      { name: "Litter Box — Retarget",     spend: 6.20 },
      { name: "Litter Box — Cold Aug",     spend: 5.10 },
      { name: "Brand Awareness — June",    spend: 3.50 },
    ]
  }
};
</script>

<!-- ─── DASHBOARD RENDERER ───────────────────────────────────────────────── -->
<script>
const tk  = (n) => "৳ " + Math.round(n).toLocaleString("en-IN");
const usd = (n) => "$ " + Number(n).toFixed(2);
const pct = (part, total) => total ? Math.round((part / total) * 100) : 0;

const CAMP_COLORS = ["#C8553D","#4F7060","#6B9AB8","#E8A838","#9B59B6","#E67E22"];
const STAGE_COLORS = { "Processing": "#E8A838", "In Courier": "#6B9AB8", "Delivered": "#4F7060" };
const STAGE_PILLS  = { "Processing": "pill-amber", "In Courier": "pill-blue", "Delivered": "pill-green" };

function render(D) {
  const cur = D.meta.currency || "৳";
  const page = document.getElementById("page");

  // Update header
  document.getElementById("dateLine").textContent = `${D.meta.date} · Generated ${D.meta.generatedAt}`;
  const badge = document.getElementById("statusBadge");
  const text  = document.getElementById("statusText");
  if (D.meta.live) {
    badge.className = "status-badge live";
    text.textContent = "Live";
  } else {
    badge.className = "status-badge sample";
    text.textContent = "Sample data";
  }

  const o = D.orders;
  const sf = D.steadfast;
  const ads = D.ads;

  const totalOrders = o.orderCount;
  const totalRevenue = o.totalSales;

  // Channel bar max
  const maxChanRev = Math.max(...o.channels.map(c => c.revenue));
  const maxStageCnt = Math.max(...o.stages.map(s => s.orders));

  // Payout math
  const gross = sf.deliveredToday.cod;
  const netInHand = sf.payout.netInHand;
  const netPct = gross ? ((netInHand / gross) * 100).toFixed(1) : "—";

  page.innerHTML = `

    <!-- ── ORDERS ──────────────────────────────────────────── -->
    <p class="section-title">Orders — Today</p>

    <div class="kpi-grid" style="margin-bottom:20px">
      <div class="kpi" style="border-top-color:#C8553D">
        <div class="kpi-label">Total Sales</div>
        <div class="kpi-val">${tk(totalRevenue)}</div>
        <div class="kpi-sub">${totalOrders} orders · ${o.itemCount} items</div>
      </div>
      <div class="kpi" style="border-top-color:#4F7060">
        <div class="kpi-label">Orders</div>
        <div class="kpi-val">${totalOrders}</div>
        <div class="kpi-sub">Avg ${tk(Math.round(totalRevenue / totalOrders))} / order</div>
      </div>
      <div class="kpi" style="border-top-color:#6B9AB8">
        <div class="kpi-label">Items Sold</div>
        <div class="kpi-val">${o.itemCount}</div>
        <div class="kpi-sub">${(o.itemCount / totalOrders).toFixed(1)} per order</div>
      </div>
    </div>

    <div class="row row-3 section-gap">

      <!-- Products -->
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">Products</h3>
        <div class="item-list">
          ${o.products.map(p => `
          <div class="item-row">
            <span class="item-name">${p.name}</span>
            <span class="item-sub" style="color:#6B6255">×${p.qty}</span>
            <span class="item-val">${tk(p.revenue)}</span>
          </div>`).join("")}
        </div>
      </div>

      <!-- Channels -->
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">By Channel</h3>
        <div>
          ${o.channels.map(c => `
          <div class="bar-row">
            <div class="bar-header">
              <span style="font-size:13px;color:#23201A">${c.name}</span>
              <span style="font-size:12px;color:#6B6255">${c.orders} orders · ${tk(c.revenue)}</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${pct(c.revenue, maxChanRev)}%;background:#C8553D"></div>
            </div>
          </div>`).join("")}
        </div>
      </div>

      <!-- Stages -->
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">Order Stage</h3>
        <div>
          ${o.stages.map(s => `
          <div class="bar-row">
            <div class="bar-header" style="align-items:center">
              <span class="pill ${STAGE_PILLS[s.name] || 'pill-amber'}">${s.name}</span>
              <span style="font-size:12px;color:#6B6255">${s.orders} · ${tk(s.amount)}</span>
            </div>
            <div class="bar-track" style="margin-top:5px">
              <div class="bar-fill" style="width:${pct(s.orders, maxStageCnt)}%;background:${STAGE_COLORS[s.name] || '#E2D6C2'}"></div>
            </div>
          </div>`).join("")}
        </div>
      </div>
    </div>

    <!-- ── STEADFAST ───────────────────────────────────────── -->
    <p class="section-title">Steadfast — Today</p>

    <div class="row row-3 section-gap">

      <!-- Delivered today -->
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">Delivered Today</h3>
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
          <span style="font-family:'Fraunces',serif;font-size:32px;font-weight:700;color:#4F7060">${sf.deliveredToday.parcels}</span>
          <span style="font-size:13px;color:#6B6255">parcels</span>
        </div>
        <div style="font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:#23201A">${tk(sf.deliveredToday.cod)}</div>
        <div style="font-size:11px;color:#6B6255;margin-top:2px">Gross COD collected</div>
      </div>

      <!-- Payout breakdown -->
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">Payout Breakdown</h3>
        <div>
          <div class="payout-row">
            <span style="color:#6B6255">Gross COD</span>
            <span>${tk(gross)}</span>
          </div>
          <div class="payout-row">
            <span style="color:#6B6255">Shipping charges</span>
            <span class="payout-neg">−${tk(sf.payout.shipping)}</span>
          </div>
          <div class="payout-row">
            <span style="color:#6B6255">COD fee (1%)</span>
            <span class="payout-neg">−${tk(sf.payout.codFee)}</span>
          </div>
          ${sf.payout.returns > 0 ? `
          <div class="payout-row">
            <span style="color:#6B6255">Returns</span>
            <span class="payout-neg">−${tk(sf.payout.returns)}</span>
          </div>` : ""}
          <div class="payout-row">
            <span>Net in hand</span>
            <span class="payout-total">${tk(netInHand)} <span style="font-size:11px;color:#6B6255;font-family:'DM Sans'">(${netPct}%)</span></span>
          </div>
        </div>
      </div>

      <!-- Balance -->
      <div class="card" style="display:flex;flex-direction:column;justify-content:space-between">
        <h3 style="font-size:15px;margin-bottom:14px">Withdrawable Balance</h3>
        <div>
          <div style="font-family:'Fraunces',serif;font-size:32px;font-weight:700;color:#4F7060;line-height:1.1">${tk(sf.balanceAvailable)}</div>
          <div style="font-size:11px;color:#6B6255;margin-top:6px">Available to withdraw from Steadfast portal</div>
        </div>
        <div style="margin-top:16px;padding-top:12px;border-top:1px solid #F3EADB">
          <div style="font-size:11px;color:#6B6255">Note: Steadfast delivered today = prior orders now confirmed. Not the same as today's orders.</div>
        </div>
      </div>
    </div>

    <!-- ── ADS ────────────────────────────────────────────── -->
    <p class="section-title">Meta Ads — Today</p>

    <div class="row row-2 section-gap">

      <!-- Spend KPI -->
      <div class="card" style="display:flex;flex-direction:column;gap:16px">
        <div>
          <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#6B6255;margin-bottom:6px">Total Ad Spend Today</div>
          <div style="font-family:'Fraunces',serif;font-size:38px;font-weight:700;color:#E8A838">${usd(ads.spendToday)}</div>
        </div>
        <div style="padding-top:12px;border-top:1px solid #F3EADB">
          <div style="font-size:12px;color:#6B6255">Implied ROAS (vs gross orders)</div>
          <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:#23201A;margin-top:2px">
            ${ads.spendToday > 0 ? (totalRevenue / ads.spendToday).toFixed(2) + "×" : "—"}
          </div>
          <div style="font-size:10px;color:#6B6255;margin-top:2px">Gross orders ÷ ad spend · not adjusted for FB attribution</div>
        </div>
      </div>

      <!-- Campaigns -->
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">By Campaign</h3>
        <div>
          ${ads.campaigns.map((c, i) => `
          <div class="camp-row">
            <div class="camp-dot" style="background:${CAMP_COLORS[i % CAMP_COLORS.length]}"></div>
            <div class="camp-name">${c.name}</div>
            <div class="camp-amt">${usd(c.spend)}</div>
          </div>`).join("")}
          <div style="margin-top:10px;padding-top:10px;border-top:1px solid #E2D6C2;display:flex;justify-content:space-between;font-size:13px;font-weight:700">
            <span>Total</span>
            <span style="font-family:'Fraunces',serif">${usd(ads.campaigns.reduce((s,c)=>s+c.spend,0))}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- bottom note -->
    <div style="text-align:center;padding:16px;font-size:12px;color:#6B6255;border-top:1px solid #E2D6C2">
      ${D.meta.live
        ? `Live · Last fetched ${D.meta.generatedAt} · <a href="index.html" style="color:#C8553D;text-decoration:none">← Team tracker</a>`
        : `Sample data · Wire the Chrome extension to see live numbers · <a href="index.html" style="color:#C8553D;text-decoration:none">← Team tracker</a>`
      }
    </div>
  `;
}

const SUPABASE_URL     = "https://dicanelropavoaqisebh.supabase.co";
const SUPABASE_ANON    = "sb_publishable_dO4YNs6kZZhzIKQQ2Q8UuQ_BLSe2OaW";
const EDGE_FN_URL      = SUPABASE_URL + "/functions/v1/fetch-dashboard";

async function initDashboard({ forceRefresh = false } = {}) {
  const btn  = document.getElementById("btnRefresh");
  const badge = document.getElementById("statusBadge");
  const txt   = document.getElementById("statusText");

  const setStatus = (cls, label) => {
    if (badge) badge.className = "status-badge " + cls;
    if (txt)   txt.textContent = label;
  };

  // Extension-injected data takes priority
  if (!forceRefresh && typeof window.MEOWMESH_DATA !== "undefined" && window.MEOWMESH_DATA) {
    render(window.MEOWMESH_DATA);
    return;
  }

  if (forceRefresh) {
    // Refresh: call edge function directly, show spinner on button
    if (btn) { btn.textContent = "⟳ Fetching…"; btn.disabled = true; }
    setStatus("sample", "Refreshing…");
    try {
      const fresh = await fetchFresh();
      if (fresh) { render(fresh); }
      else       { setStatus("sample", "Refresh failed — showing cached"); }
    } catch (e) {
      setStatus("sample", "Error: " + e.message);
    } finally {
      if (btn) { btn.textContent = "⟳ Refresh"; btn.disabled = false; }
    }
    return;
  }

  // Page load: show cache instantly, then refresh in background
  setStatus("sample", "Loading…");
  try {
    const cached = await fetchCached();
    if (cached) render(cached);
    // Background refresh
    fetchFresh()
      .then(fresh => { if (fresh) render(fresh); })
      .catch(() => {});
  } catch (e) {
    render(SAMPLE_DATA);
  }
}

async function fetchCached() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/dashboard_snapshots?id=eq.1&select=data`,
    { headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` } }
  );
  if (!res.ok) return null;
  const rows = await res.json();
  return rows?.[0]?.data || null;
}

async function fetchFresh() {
  const res = await fetch(EDGE_FN_URL, {
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
  });
  if (!res.ok) {
    const txt = await res.text().catch(() => "");
    throw new Error(`Edge function ${res.status}: ${txt.slice(0,80)}`);
  }
  return await res.json();
}

document.addEventListener("DOMContentLoaded", () => {
  initDashboard();
  document.getElementById("btnRefresh")?.addEventListener("click", () => {
    window.MEOWMESH_DATA = null;
    initDashboard({ forceRefresh: true });
  });
});
</script>

</body>
</html>
