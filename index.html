<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeowMesh — Team Tracker</title>

  <!-- React + Babel (no build step needed) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Supabase client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- SheetJS for Excel parsing -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <!-- Chart.js for PowerBI-like charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600&display=swap');
    * { box-sizing: border-box; }
    body { margin: 0; }
    ::selection { background: #C8553D; color: #fff; }
    @keyframes pop { from { transform: scale(.96); opacity:0 } to { transform: scale(1); opacity:1 } }
    textarea, button, input { font-family: inherit; }
    input[type=range] { -webkit-appearance:none; appearance:none; background:transparent; cursor:pointer; height:28px; outline:none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:#C8553D; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.25); margin-top:-7px; }
    input[type=range]::-webkit-slider-runnable-track { height:6px; border-radius:999px; background:transparent; }
    input[type=range]::-moz-range-thumb { width:20px; height:20px; border-radius:50%; background:#C8553D; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.25); }
    input[type=range]::-moz-range-track { height:6px; border-radius:999px; background:transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- ============================================================= -->
  <!--  STEP 1 of setup: paste your Supabase details on the 2 lines  -->
  <!--  below (you'll get them from supabase.com — see the README).  -->
  <!-- ============================================================= -->
  <script>
    window.SUPABASE_URL = "https://dicanelropavoaqisebh.supabase.co";    window.SUPABASE_ANON_KEY = "sb_publishable_dO4YNs6kZZhzIKQQ2Q8UuQ_BLSe2OaW";
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const COLORS = {
      paper: "#FBF6EC", paper2: "#F3EADB", ink: "#23201A", inkSoft: "#6B6255",
      clay: "#C8553D", clayDark: "#A8422F", sage: "#4F7060", line: "#E2D6C2", white: "#FFFFFF",
    };

    const TASKS = {
      marketer: { label: "Marketer",
        daily: [
          { id: "m_d0", text: "Content Creation", type: "check" },
          { id: "m_d1", text: "Content Posting -1 (Engagement)", type: "check" },
          { id: "m_d2", text: "Content Posting -2 (Review / Product pic)", type: "check" },
          { id: "m_d3", text: "Support Customer (Sending Reply)", type: "number" },
          { id: "m_d4", text: "Previous Customer Reach", type: "number" },
        ],
        weekly: [
          { id: "m_w1", text: "Content Plan for Next Week", type: "check" },
          { id: "m_w2", text: "Offer Creation", type: "check" },
        ] },
      operations: { label: "Operations",
        daily: [
          { id: "o_d1", text: "Product Making", type: "number" },
          { id: "o_d2", text: "Product Delivery", type: "number" },
          { id: "o_d3", text: "Update the Cost in Excel", type: "check" },
        ],
        weekly: [
          { id: "o_w1", text: "Plan for Next Week", type: "check" },
          { id: "o_w2", text: "Make Next Week Must-Have Items", type: "check" },
          { id: "o_w3", text: "Product Development", type: "textarea" },
        ] },
    };

    const OWNER_TASKS = [
      { id: "ow_1", text: "Review monthly revenue & sales", type: "check" },
      { id: "ow_2", text: "Supplier payments & procurement", type: "check" },
      { id: "ow_3", text: "Team performance review", type: "check" },
      { id: "ow_4", text: "Marketing review & next month plan", type: "check" },
      { id: "ow_5", text: "Set next month's goals", type: "check" },
      { id: "ow_6", text: "Stock & inventory audit", type: "check" },
    ];

    const todayStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    };
    const monthStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`;
    };
    const prettyMonth = () => new Date().toLocaleDateString(undefined, { month: "long", year: "numeric" });
    const prettyDate = (s) => {
      const [y,m,d] = s.split("-").map(Number);
      return new Date(y, m-1, d).toLocaleDateString(undefined, { weekday:"short", month:"short", day:"numeric" });
    };

    const DAY_LABELS = ["S","M","T","W","T","F","S"];
    const FULL_DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

    const getWeekStart = (dateStr) => {
      const [y,m,d] = dateStr.split("-").map(Number);
      const dt = new Date(y, m-1, d);
      dt.setDate(dt.getDate() - dt.getDay());
      return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
    };
    const getWeekDays = (weekStartStr) => {
      const [y,m,d] = weekStartStr.split("-").map(Number);
      return Array.from({length:7}, (_,i) => {
        const dt = new Date(y, m-1, d+i);
        return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
      });
    };

    const isDone = (task, val) => {
      if (task.type === "check") return !!val;
      if (task.type === "number") return (val || 0) > 0;
      if (task.type === "textarea") return !!(val && val.text && val.text.trim());
      return false;
    };

    // ---- Supabase connection ----
    const CONFIGURED = window.SUPABASE_URL && window.SUPABASE_URL.indexOf("PASTE_") === -1
      && window.SUPABASE_ANON_KEY && window.SUPABASE_ANON_KEY.indexOf("PASTE_") === -1;
    const sb = CONFIGURED ? supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY) : null;

    const SALES_PIN = "8520";

    function App() {
      const [view, setView] = useState("select");
      const [reports, setReports] = useState({});
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState("");
      const [pinModal, setPinModal] = useState(false);

      const loadReports = async () => {
        if (!sb) { setLoading(false); return; }
        setLoading(true); setError("");
        const { data, error } = await sb.from("reports").select("*");
        if (error) { setError(error.message); setLoading(false); return; }
        const out = {};
        (data || []).forEach((r) => { out[`${r.date}:${r.person}`] = r; });
        setReports(out); setLoading(false);
      };

      useEffect(() => { loadReports(); }, []);

      const saveReport = async (report) => {
        if (!sb) return false;
        const { error } = await sb.from("reports")
          .upsert(report, { onConflict: "date,person" });
        if (error) { setError(error.message); return false; }
        setReports((p) => ({ ...p, [`${report.date}:${report.person}`]: report }));
        return true;
      };

      if (!CONFIGURED) return <SetupNeeded />;

      return (
        <div style={{ minHeight:"100vh", background:COLORS.paper, color:COLORS.ink, fontFamily:"'DM Sans', sans-serif" }}>
          <Header view={view} setView={setView} />
          <div style={{ maxWidth:880, margin:"0 auto", padding:"0 20px 64px" }}>
            {error && <Banner text={"Connection issue: " + error} />}
            {view === "select" && <RolePicker setView={setView} onSalesDash={() => setPinModal(true)} />}
            {(view === "marketer" || view === "operations") &&
              <EmployeeView person={view} reports={reports} onSave={saveReport} />}
            {view === "owner" && <OwnerView reports={reports} loading={loading} reload={loadReports} onSave={saveReport} />}
            {view === "salesdash" && <SalesDashView reports={reports} onSave={saveReport} />}
          </div>
          {pinModal && <PinModal onSuccess={() => { setView("salesdash"); setPinModal(false); }} onClose={() => setPinModal(false)} />}
        </div>
      );
    }

    function SetupNeeded() {
      return (
        <div style={{ minHeight:"100vh", background:COLORS.paper, color:COLORS.ink, fontFamily:"'DM Sans', sans-serif", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
          <div style={{ maxWidth:520, background:COLORS.white, border:`1px solid ${COLORS.line}`, borderRadius:18, padding:"32px 28px" }}>
            <div style={{ fontSize:34 }}>🐾</div>
            <h1 style={{ fontFamily:"'Fraunces', serif", fontSize:26, margin:"10px 0 8px" }}>Almost there!</h1>
            <p style={{ color:COLORS.inkSoft, lineHeight:1.6, margin:"0 0 14px" }}>
              The app is installed but not yet connected to your database. Open <b>index.html</b>, find the two lines near the top that say <code>PASTE_YOUR_…</code>, and replace them with your Supabase URL and anon key.
            </p>
            <p style={{ color:COLORS.inkSoft, lineHeight:1.6, margin:0 }}>
              The README file has the exact steps. Once saved and uploaded, this screen disappears.
            </p>
          </div>
        </div>
      );
    }

    function Banner({ text }) {
      return <div style={{ background:"#FBEAE6", border:`1px solid #E8C4BB`, color:COLORS.clayDark, padding:"12px 16px", borderRadius:12, margin:"0 0 20px", fontSize:14 }}>{text}</div>;
    }

    function Header({ view, setView }) {
      return (
        <div style={{ borderBottom:`1px solid ${COLORS.line}`, background:COLORS.paper2, marginBottom:32 }}>
          <div style={{ maxWidth:880, margin:"0 auto", padding:"20px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:16, flexWrap:"wrap" }}>
            <button onClick={() => setView("select")} style={{ all:"unset", cursor:"pointer", display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:26 }}>🐾</span>
              <span style={{ fontFamily:"'Fraunces', serif", fontWeight:700, fontSize:24, letterSpacing:"-0.02em" }}>
                MeowMesh <span style={{ color:COLORS.clay }}>Tracker</span>
              </span>
            </button>
            {view !== "select" &&
              <button onClick={() => setView("select")} style={{ all:"unset", cursor:"pointer", fontSize:14, fontWeight:600, color:COLORS.inkSoft, padding:"8px 14px", borderRadius:999, border:`1px solid ${COLORS.line}`, background:COLORS.white }}>← Switch role</button>}
          </div>
        </div>
      );
    }

    function RolePicker({ setView, onSalesDash }) {
      const roles = [
        { id:"owner", emoji:"📊", title:"Owner", desc:"See everyone's progress at a glance." },
        { id:"marketer", emoji:"📣", title:"Marketer", desc:"Log today's content, engagement & outreach." },
        { id:"operations", emoji:"📦", title:"Operations", desc:"Log fulfilment, stock & product work." },
      ];
      return (
        <div style={{ animation:"pop .3s ease" }}>
          <p style={{ fontFamily:"'Fraunces', serif", fontSize:32, fontWeight:600, margin:"8px 0 6px", letterSpacing:"-0.02em" }}>Who's checking in?</p>
          <p style={{ color:COLORS.inkSoft, margin:"0 0 28px", fontSize:16 }}>Pick your role to get started.</p>
          <div style={{ display:"grid", gap:16 }}>
            {roles.map((r) => (
              <button key={r.id} onClick={() => setView(r.id)}
                style={{ all:"unset", cursor:"pointer", display:"flex", alignItems:"center", gap:18, padding:"22px 24px", borderRadius:18, background:COLORS.white, border:`1px solid ${COLORS.line}`, transition:"transform .15s, box-shadow .15s" }}
                onMouseEnter={(e)=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 10px 30px rgba(35,32,26,0.08)";}}
                onMouseLeave={(e)=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
                <span style={{ fontSize:34 }}>{r.emoji}</span>
                <span style={{ flex:1 }}>
                  <span style={{ display:"block", fontFamily:"'Fraunces', serif", fontWeight:600, fontSize:21 }}>{r.title}</span>
                  <span style={{ display:"block", color:COLORS.inkSoft, fontSize:14.5, marginTop:2 }}>{r.desc}</span>
                </span>
                <span style={{ color:COLORS.clay, fontSize:22 }}>→</span>
              </button>
            ))}
          </div>
          <div style={{ marginTop:28, borderTop:`1px solid ${COLORS.line}`, paddingTop:24 }}>
            <button onClick={onSalesDash}
              style={{ all:"unset", cursor:"pointer", display:"flex", alignItems:"center", gap:18, padding:"22px 24px", borderRadius:18, background:"#1C1916", border:`1px solid #1C1916`, width:"100%", boxSizing:"border-box", transition:"transform .15s, box-shadow .15s" }}
              onMouseEnter={(e)=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 10px 30px rgba(35,32,26,0.2)";}}
              onMouseLeave={(e)=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
              <span style={{ fontSize:34 }}>📈</span>
              <span style={{ flex:1 }}>
                <span style={{ display:"block", fontFamily:"'Fraunces', serif", fontWeight:600, fontSize:21, color:"#fff" }}>Sales & Cost Dashboard</span>
                <span style={{ display:"block", fontSize:14.5, marginTop:2, color:"rgba(255,255,255,0.55)" }}>Revenue, expenses & profit overview · PIN protected</span>
              </span>
              <span style={{ fontSize:20 }}>🔒</span>
            </button>
          </div>
        </div>
      );
    }

    function EmployeeView({ person, reports, onSave }) {
      const cfg = TASKS[person];
      const today = todayStr();
      const todayDow = new Date().getDay();
      const weekStart = getWeekStart(today);
      const existing = reports[`${today}:${person}`];

      const weeklySource = (() => {
        const wr = Object.values(reports)
          .filter(r => r.person === person && getWeekStart(r.date) === weekStart)
          .sort((a,b) => b.date.localeCompare(a.date));
        return wr[0] || null;
      })();

      // Derive overdue tasks from all previous days' unfinished custom tasks
      const allDueTasks = (() => {
        const completedIds = new Set(((existing && existing.daily && existing.daily["__dueCompleted"]) || []).map(d => d.id));
        const seen = new Set();
        const due = [];
        Object.values(reports)
          .filter(r => r.person === person && r.date < today)
          .sort((a,b) => b.date.localeCompare(a.date))
          .forEach(r => {
            const custom = (r.daily && r.daily["__custom"]) || [];
            custom.forEach(t => {
              if (!t.done && !seen.has(t.id) && !completedIds.has(t.id)) {
                seen.add(t.id);
                due.push({ ...t, fromDate: r.date });
              }
            });
          });
        return due;
      })();

      const [tab, setTab] = useState("checklist");
      const [daily, setDaily] = useState({});
      const [customTasks, setCustomTasks] = useState([]);
      const [dueCompleted, setDueCompleted] = useState([]);
      const [weeklyProgress, setWeeklyProgress] = useState({});
      const [customWeeklyTasks, setCustomWeeklyTasks] = useState([]);
      const [labels, setLabels] = useState({});
      const [weeklyLabels, setWeeklyLabels] = useState({});
      const [newTaskText, setNewTaskText] = useState("");
      const [newWeeklyText, setNewWeeklyText] = useState("");
      const [notes, setNotes] = useState("");
      const [blockers, setBlockers] = useState("");
      const [customerReports, setCustomerReports] = useState([]);
      const [saved, setSaved] = useState(false);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        const d = (existing && existing.daily) || {};
        setDaily(d);
        setCustomTasks(d["__custom"] || []);
        setDueCompleted(d["__dueCompleted"] || []);
        setLabels(d["__labels"] || {});
        const w = (weeklySource && weeklySource.weekly) || {};
        setWeeklyProgress(w["__progress"] || {});
        setCustomWeeklyTasks(w["__customProgress"] || []);
        setWeeklyLabels(w["__labels"] || {});
        setNotes((existing && existing.notes) || "");
        setBlockers((existing && existing.blockers) || "");
        setCustomerReports(d["__customerReports"] || []);
        setSaved(false);
      }, [person, existing && existing.date, weeklySource && weeklySource.date]);

      const updateDaily = (id, val) => { setDaily(p => ({ ...p, [id]: val })); setSaved(false); };
      const completeDue = (task) => { setDueCompleted(p => [...p, { id: task.id, text: task.text, fromDate: task.fromDate }]); setSaved(false); };
      const completedDueIds = new Set(dueCompleted.map(d => d.id));
      const visibleDue = allDueTasks.filter(t => !completedDueIds.has(t.id));

      const addWeeklyTask = () => {
        if (!newWeeklyText.trim()) return;
        setCustomWeeklyTasks(p => [...p, { id: Date.now().toString(), text: newWeeklyText.trim(), pct: 0 }]);
        setNewWeeklyText("");
        setSaved(false);
      };
      const updateCustomWeeklyPct = (id, pct) => { setCustomWeeklyTasks(p => p.map(t => t.id===id?{...t,pct}:t)); setSaved(false); };
      const removeCustomWeeklyTask = (id) => { setCustomWeeklyTasks(p => p.filter(t => t.id!==id)); setSaved(false); };
      const renameCustomWeeklyTask = (id, text) => { setCustomWeeklyTasks(p => p.map(t => t.id===id?{...t,text}:t)); setSaved(false); };

      const doneCount = cfg.daily.filter((t) => isDone(t, daily[t.id])).length;
      const customDone = customTasks.filter(t => t.done).length;
      const barCount = tab === "manual" ? customDone : doneCount;
      const barTotal = tab === "manual" ? (customTasks.length || 1) : cfg.daily.length;

      const streak = (() => {
        let count = 0;
        const dt = new Date();
        if (!reports[`${today}:${person}`]) dt.setDate(dt.getDate() - 1);
        while (true) {
          const s = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
          if (reports[`${s}:${person}`]) { count++; dt.setDate(dt.getDate() - 1); }
          else break;
        }
        return count;
      })();

      const submit = async () => {
        setSaving(true);
        const dailySave = { ...daily, "__custom": customTasks, "__labels": labels, "__dueCompleted": dueCompleted, "__customerReports": customerReports };
        const weeklySave = { "__progress": weeklyProgress, "__labels": weeklyLabels, "__customProgress": customWeeklyTasks };
        const ok = await onSave({ date: today, person, daily: dailySave, weekly: weeklySave, notes, blockers, updated_at: new Date().toISOString() });
        setSaving(false);
        if (ok) { setSaved(true); setTimeout(() => setSaved(false), 2500); }
      };

      return (
        <div style={{ animation:"pop .3s ease" }}>
          <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
            <p style={{ fontFamily:"'Fraunces', serif", fontSize:30, fontWeight:600, margin:"4px 0", letterSpacing:"-0.02em" }}>{cfg.label} — today</p>
            <span style={{ color:COLORS.inkSoft, fontSize:15 }}>{prettyDate(today)}</span>
          </div>
          {streak > 0 && (
            <div style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"6px 14px", borderRadius:999, background:"#FEF3EF", border:`1px solid ${COLORS.clay}`, margin:"10px 0 4px" }}>
              <span style={{ fontSize:15 }}>🔥</span>
              <span style={{ fontSize:14, fontWeight:700, color:COLORS.clay }}>
                {streak}-day streak{streak >= 7 ? " 🏆 Perfect week!" : streak >= 5 ? " — keep going!" : ""}
              </span>
            </div>
          )}
          <div style={{ height:8, background:COLORS.paper2, borderRadius:999, overflow:"hidden", margin:"14px 0 20px" }}>
            <div style={{ height:"100%", width:`${(barCount/barTotal)*100}%`, background:COLORS.clay, transition:"width .3s" }} />
          </div>
          {visibleDue.length > 0 && (
            <div style={{ marginBottom:24 }}>
              <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:10 }}>
                <h3 style={{ fontFamily:"'Fraunces', serif", fontSize:18, fontWeight:600, margin:0, color:COLORS.clayDark }}>Overdue</h3>
                <span style={{ fontSize:13, color:COLORS.clay, fontWeight:600 }}>{visibleDue.length} task{visibleDue.length>1?"s":""} missed</span>
              </div>
              <div style={{ display:"grid", gap:8 }}>
                {visibleDue.map(t => (
                  <div key={t.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"11px 14px", borderRadius:12, background:"#FEF3EF", border:`1.5px solid ${COLORS.clay}` }}>
                    <button onClick={() => completeDue(t)}
                      style={{ all:"unset", cursor:"pointer", width:22, height:22, borderRadius:7, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", background:"transparent", border:`2px solid ${COLORS.clay}`, color:"#fff", fontSize:14, fontWeight:700 }}>
                    </button>
                    <span style={{ flex:1, fontSize:15, color:COLORS.ink }}>{t.text}</span>
                    <span style={{ fontSize:12, color:COLORS.clay, fontWeight:600, whiteSpace:"nowrap" }}>{prettyDate(t.fromDate)}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          <div style={{ display:"flex", marginBottom:28, borderRadius:10, overflow:"hidden", border:`1px solid ${COLORS.line}` }}>
            {[["checklist",`✓  Checklist`],["manual","✏  Manual Entry"],...(person==="marketer"?[["customerreport","📞  Customer Report"]]:[])].map(([id,lbl]) => (
              <button key={id} onClick={() => setTab(id)}
                style={{ all:"unset", cursor:"pointer", flex:1, padding:"11px 16px", textAlign:"center", fontSize:14, fontWeight:600,
                  background: tab===id ? COLORS.ink : COLORS.white,
                  color: tab===id ? "#fff" : COLORS.inkSoft, transition:"background .15s" }}>
                {lbl}
              </button>
            ))}
          </div>
          {tab === "checklist" && (
            <>
              <Section title="Daily tasks" sub={`${doneCount}/${cfg.daily.length} done · resets each day`}>
                {cfg.daily.map((t) => (
                  <TaskItem key={t.id} task={t} value={daily[t.id]}
                    label={labels[t.id]} onLabelChange={(v) => { setLabels(p=>({...p,[t.id]:v})); setSaved(false); }}
                    onChange={(v) => updateDaily(t.id, v)} />
                ))}
              </Section>
              {customTasks.length > 0 && (
                <Section title="My tasks" sub={`${customDone}/${customTasks.length} done`}>
                  {customTasks.map(t => (
                    <div key={t.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"11px 14px", borderRadius:12, background: t.done?"#F1F6F2":COLORS.white, border:`1px solid ${t.done?"#CFE0D4":COLORS.line}` }}>
                      <button onClick={() => { setCustomTasks(p=>p.map(ct=>ct.id===t.id?{...ct,done:!ct.done}:ct)); setSaved(false); }}

    function OwnerTaskView({ reports, onSave }) {
      const thisMonth = monthStr();
      const existing = reports[`${thisMonth}:owner`];

      const [tasks, setTasks] = useState({});
      const [labels, setLabels] = useState({});
      const [customTasks, setCustomTasks] = useState([]);
      const [monthlyProgress, setMonthlyProgress] = useState([]);
      const [newCustomText, setNewCustomText] = useState("");
      const [newProgressText, setNewProgressText] = useState("");
      const [notes, setNotes] = useState("");
      const [blockers, setBlockers] = useState("");
      const [saved, setSaved] = useState(false);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        const d = (existing && existing.daily) || {};
        setTasks(d);
        setLabels(d["__labels"] || {});
        setCustomTasks(d["__custom"] || []);
        const w = (existing && existing.weekly) || {};
        setMonthlyProgress(w["__customProgress"] || []);
        setNotes((existing && existing.notes) || "");
        setBlockers((existing && existing.blockers) || "");
        setSaved(false);
      }, [existing && existing.date]);

      const doneCount = OWNER_TASKS.filter(t => !!tasks[t.id]).length;
      const customDone = customTasks.filter(t => t.done).length;

      const addCustomTask = () => {
        if (!newCustomText.trim()) return;
        setCustomTasks(p => [...p, { id: Date.now().toString(), text: newCustomText.trim(), done: false }]);
        setNewCustomText("");
        setSaved(false);
      };
      const addProgress = () => {
        if (!newProgressText.trim()) return;
        setMonthlyProgress(p => [...p, { id: Date.now().toString(), text: newProgressText.trim(), pct: 0 }]);
        setNewProgressText("");
        setSaved(false);
      };

      const submit = async () => {
        setSaving(true);
        const dailySave = { ...tasks, "__labels": labels, "__custom": customTasks };
        const weeklySave = { "__customProgress": monthlyProgress };
        const ok = await onSave({ date: thisMonth, person: "owner", daily: dailySave, weekly: weeklySave, notes, blockers, updated_at: new Date().toISOString() });
        setSaving(false);
        if (ok) { setSaved(true); setTimeout(() => setSaved(false), 2500); }
      };

      return (
        <div>
          <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", flexWrap:"wrap", gap:8, marginBottom:14 }}>
            <span style={{ fontFamily:"'Fraunces', serif", fontSize:20, fontWeight:600, color:COLORS.inkSoft }}>{prettyMonth()}</span>
            <span style={{ fontSize:13, color:COLORS.inkSoft }}>resets each month</span>
          </div>
          <div style={{ height:8, background:COLORS.paper2, borderRadius:999, overflow:"hidden", marginBottom:28 }}>
            <div style={{ height:"100%", width:`${((doneCount+customDone)/(OWNER_TASKS.length+(customTasks.length||1)))*100}%`, background:COLORS.clay, transition:"width .3s" }} />
          </div>
          <Section title="Monthly tasks" sub={`${doneCount}/${OWNER_TASKS.length} done`}>
            {OWNER_TASKS.map(t => (
              <TaskItem key={t.id} task={t} value={tasks[t.id]}
                label={labels[t.id]} onLabelChange={(v) => { setLabels(p=>({...p,[t.id]:v})); setSaved(false); }}
                onChange={(v) => { setTasks(p=>({...p,[t.id]:v})); setSaved(false); }} />
            ))}
          </Section>
          {customTasks.length > 0 && (
            <Section title="My tasks" sub={`${customDone}/${customTasks.length} done`}>
              {customTasks.map(t => (
                <EditableCustomTask key={t.id} task={t}
                  onToggle={() => { setCustomTasks(p=>p.map(ct=>ct.id===t.id?{...ct,done:!ct.done}:ct)); setSaved(false); }}
                  onRemove={() => { setCustomTasks(p=>p.filter(ct=>ct.id!==t.id)); setSaved(false); }}
                  onEdit={(text) => { setCustomTasks(p=>p.map(ct=>ct.id===t.id?{...ct,text}:ct)); setSaved(false); }} />
              ))}
            </Section>
          )}
          <Section title="Monthly progress" sub="drag slider to update %">
            {monthlyProgress.map(t => (
              <div key={t.id} style={{ display:"flex", alignItems:"stretch", gap:6 }}>
                <div style={{ flex:1 }}>
                  <SliderTask task={{ id: t.id, text: t.text, type: "check" }} value={t.pct} label={t.text}
                    onLabelChange={(v) => { setMonthlyProgress(p=>p.map(ct=>ct.id===t.id?{...ct,text:v}:ct)); setSaved(false); }}
                    onChange={(v) => { setMonthlyProgress(p=>p.map(ct=>ct.id===t.id?{...ct,pct:v}:ct)); setSaved(false); }} />
                </div>
                <button onClick={() => { setMonthlyProgress(p=>p.filter(ct=>ct.id!==t.id)); setSaved(false); }}
                  style={{ all:"unset", cursor:"pointer", display:"flex", alignItems:"center", paddingLeft:4, fontSize:20, color:COLORS.inkSoft }}>×</button>
              </div>
            ))}
            <div style={{ display:"flex", gap:8, marginTop:4 }}>
              <input value={newProgressText} onChange={(e) => setNewProgressText(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") addProgress(); }}
                placeholder="Add a monthly goal…"
                style={{ flex:1, padding:"10px 14px", borderRadius:10, border:`1px solid ${COLORS.line}`, fontSize:14, fontFamily:"inherit", color:COLORS.ink, background:COLORS.white, outline:"none" }} />
              <button onClick={addProgress}
                style={{ all:"unset", cursor:"pointer", padding:"10px 16px", borderRadius:10, background:COLORS.clay, color:"#fff", fontSize:14, fontWeight:700 }}>+ Add</button>
            </div>
          </Section>
          <Section title="Add custom task" sub="">
            <div style={{ display:"flex", gap:8 }}>
              <input value={newCustomText} onChange={(e) => setNewCustomText(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") addCustomTask(); }}
                placeholder="Type a task and press Enter…"
                style={{ flex:1, padding:"11px 14px", borderRadius:10, border:`1px solid ${COLORS.line}`, fontSize:15, fontFamily:"inherit", color:COLORS.ink, background:COLORS.white, outline:"none" }} />
              <button onClick={addCustomTask}
                style={{ all:"unset", cursor:"pointer", padding:"11px 18px", borderRadius:10, background:COLORS.clay, color:"#fff", fontSize:14, fontWeight:700 }}>Add</button>
            </div>
          </Section>
          <Section title="Notes">
            <Textarea value={notes} onChange={(v)=>{setNotes(v);setSaved(false);}} placeholder="Monthly notes, decisions, key events…" />
          </Section>
          <Section title="Blockers / Issues">
            <Textarea value={blockers} onChange={(v)=>{setBlockers(v);setSaved(false);}} placeholder="Any blockers or issues this month…" />
          </Section>
          <button onClick={submit} disabled={saving}
            style={{ all:"unset", cursor: saving?"default":"pointer", display:"block", textAlign:"center", width:"100%", padding:"16px", borderRadius:14, background: saved?COLORS.sage:COLORS.clay, color:"#fff", fontWeight:600, fontSize:16, marginTop:8, transition:"background .2s", opacity: saving?0.7:1 }}>
            {saving ? "Saving…" : saved ? "✓ Saved!" : existing ? "Update this month" : "Save this month"}
          </button>
        </div>
      );
    }

    function ReportCard({ report }) {
      const cfg = TASKS[report.person];
      const dailyDone = cfg.daily.filter((t) => isDone(t, report.daily && report.daily[t.id])).length;
      const pct = Math.round((dailyDone/cfg.daily.length)*100);
      const color = report.person === "marketer" ? COLORS.clay : COLORS.sage;
      const hasWeekly = cfg.weekly.some(t => {
        const v = report.weekly && report.weekly[t.id];
        if (!v) return false;
        if (t.type === "textarea") return !!(v.text && v.text.trim());
        return Object.values(v).some(Boolean);
      });
      return (
        <div style={{ background:COLORS.white, border:`1px solid ${COLORS.line}`, borderRadius:16, padding:"18px 20px" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em", color:"#fff", background:color, padding:"3px 9px", borderRadius:6 }}>{cfg.label}</span>
              <span style={{ fontSize:14.5, color:COLORS.inkSoft }}>{prettyDate(report.date)}</span>
            </div>
            <span style={{ fontFamily:"'Fraunces', serif", fontWeight:600, fontSize:18 }}>{pct}%</span>
          </div>
          <div style={{ display:"flex", gap:6, marginBottom:12, flexWrap:"wrap" }}>
            {cfg.daily.map((t) => {
              const val = report.daily && report.daily[t.id];
              const done = isDone(t, val);
              return (
                <span key={t.id} style={{ fontSize:12.5, padding:"4px 9px", borderRadius:7, background: done?"#EAF1EC":COLORS.paper2, color: done?COLORS.sage:COLORS.inkSoft, border:`1px solid ${done?"#CFE0D4":COLORS.line}` }}>
                  {done ? "✓" : "○"} {t.text}{t.type === "number" && done ? ` (${val})` : ""}
                </span>
              );
            })}
          </div>
          {hasWeekly && (
            <div style={{ marginBottom:8 }}>
              {cfg.weekly.map(t => {
                const val = report.weekly && report.weekly[t.id];
                if (!val) return null;
                if (t.type === "textarea") {
                  if (!val.text || !val.text.trim()) return null;
                  return <p key={t.id} style={{ margin:"0 0 4px", fontSize:13, color:COLORS.inkSoft }}><span style={{ fontWeight:600, color:COLORS.ink }}>{t.text}:</span> {val.text}</p>;
                }
                const activeDays = FULL_DAYS.filter((_, i) => val[i]);
                if (!activeDays.length) return null;
                return <p key={t.id} style={{ margin:"0 0 4px", fontSize:13, color:COLORS.inkSoft }}><span style={{ fontWeight:600, color:COLORS.ink }}>{t.text}:</span> {activeDays.join(", ")}</p>;
              })}
            </div>
          )}
          {(() => {
            const progress = report.weekly && report.weekly["__progress"];
            const customProg = (report.weekly && report.weekly["__customProgress"]) || [];
            const predefined = cfg.weekly.filter(t => (progress && progress[t.id] || 0) > 0);
            if (!predefined.length && !customProg.length) return null;
            const ProgBar = ({text, pct}) => (
              <div style={{ marginBottom:5 }}>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:12.5, marginBottom:3 }}>
                  <span style={{ color:COLORS.ink }}>{text}</span>
                  <span style={{ fontWeight:600, color: pct>=100?COLORS.sage:COLORS.clay }}>{pct}%</span>
                </div>
                <div style={{ height:4, background:COLORS.paper2, borderRadius:999, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${pct}%`, background: pct>=100?COLORS.sage:COLORS.clay, borderRadius:999 }} />
                </div>
              </div>
            );
            return (
              <div style={{ marginBottom:8 }}>
                <p style={{ margin:"0 0 4px", fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.05em", color:COLORS.inkSoft }}>Weekly Progress</p>
                {predefined.map(t => <ProgBar key={t.id} text={t.text} pct={progress[t.id]||0} />)}
                {customProg.filter(t => t.pct > 0).map(t => <ProgBar key={t.id} text={t.text} pct={t.pct} />)}
              </div>
            );
          })()}
          {(() => {
            const custom = report.daily && report.daily["__custom"];
            if (!custom || !custom.length) return null;
            const done = custom.filter(t => t.done).length;
            return (
              <div style={{ marginBottom:8, padding:"10px 12px", background:COLORS.paper2, borderRadius:10 }}>
                <p style={{ margin:"0 0 6px", fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.05em", color:COLORS.inkSoft }}>My tasks ({done}/{custom.length})</p>
                {custom.map(t => (
                  <div key={t.id} style={{ display:"flex", alignItems:"center", gap:7, marginBottom:3 }}>
                    <span style={{ width:16, height:16, borderRadius:4, flexShrink:0, display:"inline-flex", alignItems:"center", justifyContent:"center", background: t.done?COLORS.sage:"transparent", border:`2px solid ${t.done?COLORS.sage:COLORS.line}`, color:"#fff", fontSize:10, fontWeight:700 }}>{t.done?"✓":""}</span>
                    <span style={{ fontSize:13, color: t.done?COLORS.inkSoft:COLORS.ink, textDecoration: t.done?"line-through":"none" }}>{t.text}</span>
                  </div>
                ))}
              </div>
            );
          })()}
          {(() => {
            const due = report.daily && report.daily["__dueCompleted"];
            if (!due || !due.length) return null;
            return (
              <div style={{ marginBottom:8, padding:"8px 12px", background:"#FEF3EF", borderRadius:10, border:`1px solid #F5C9BB` }}>
                <p style={{ margin:"0 0 5px", fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.05em", color:COLORS.clay }}>Caught up ({due.length})</p>
                {due.map(t => (
                  <div key={t.id} style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>
                    <span style={{ width:14, height:14, borderRadius:4, flexShrink:0, display:"inline-flex", alignItems:"center", justifyContent:"center", background:COLORS.clay, color:"#fff", fontSize:9, fontWeight:700 }}>✓</span>
                    <span style={{ fontSize:13, color:COLORS.ink }}>{t.text}</span>
                    <span style={{ fontSize:11, color:COLORS.clay, marginLeft:"auto" }}>was due {prettyDate(t.fromDate)}</span>
                  </div>
                ))}
              </div>
            );
          })()}
          {report.notes && <Line label="Notes" text={report.notes} />}
          {report.blockers && <Line label="Blockers" text={report.blockers} warn />}
          {(() => {
            const cr = report.daily && report.daily["__customerReports"];
            if (!cr || !cr.length) return null;
            const filled = cr.filter(e => e.review && e.review.trim()).length;
            return (
              <div style={{ marginTop:10, padding:"10px 12px", background:COLORS.paper2, borderRadius:12 }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
                  <p style={{ margin:0, fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.05em", color:COLORS.inkSoft }}>Customer Report · Litter</p>
                  <span style={{ fontSize:12, fontWeight:700, color: filled===30?COLORS.sage:COLORS.clay }}>{filled}/{cr.length} filled</span>
                </div>
                <div style={{ display:"grid", gap:6 }}>
                  {cr.filter(e => e.review && e.review.trim()).map((e, i) => (
                    <div key={e.id} style={{ background:COLORS.white, borderRadius:8, padding:"8px 10px", border:`1px solid ${COLORS.line}` }}>
                      <p style={{ margin:"0 0 3px", fontSize:12, fontWeight:600, color:COLORS.ink }}>{e.customer || `Customer ${i+1}`}</p>
                      <p style={{ margin:0, fontSize:13, color:COLORS.inkSoft, lineHeight:1.5 }}>{e.review}</p>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}
        </div>
      );
    }

    function ManualView({ customTasks, setCustomTasks, newTaskText, setNewTaskText, setSaved }) {
      const addTask = () => {
        if (!newTaskText.trim()) return;
        setCustomTasks(p => [...p, { id: Date.now().toString(), text: newTaskText.trim(), done: false }]);
        setNewTaskText("");
        setSaved(false);
      };
      const toggleTask = (id) => { setCustomTasks(p => p.map(t => t.id === id ? {...t, done: !t.done} : t)); setSaved(false); };
      const removeTask = (id) => { setCustomTasks(p => p.filter(t => t.id !== id)); setSaved(false); };
      const editTask = (id, text) => { setCustomTasks(p => p.map(t => t.id === id ? {...t, text} : t)); setSaved(false); };
      const done = customTasks.filter(t => t.done).length;
      return (
        <Section title="Today's tasks" sub={customTasks.length > 0 ? `${done}/${customTasks.length} done — also in Checklist` : "tasks added here appear in Checklist too"}>
          <div style={{ display:"flex", gap:8, marginBottom:4 }}>
            <input value={newTaskText} onChange={(e) => setNewTaskText(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") addTask(); }}
              placeholder="Type a task and press Enter…"
              style={{ flex:1, padding:"11px 14px", borderRadius:10, border:`1px solid ${COLORS.line}`, fontSize:15, fontFamily:"inherit", color:COLORS.ink, background:COLORS.white, outline:"none" }} />
            <button onClick={addTask}
              style={{ all:"unset", cursor:"pointer", padding:"11px 18px", borderRadius:10, background:COLORS.clay, color:"#fff", fontSize:14, fontWeight:700 }}>Add</button>
          </div>
          {customTasks.length === 0 && (
            <div style={{ padding:"20px 14px", textAlign:"center", color:COLORS.inkSoft, fontSize:14, background:COLORS.white, borderRadius:12, border:`1px dashed ${COLORS.line}` }}>
              No tasks yet — type above and hit Add or Enter
            </div>
          )}
          {customTasks.map(t => (
            <EditableCustomTask key={t.id} task={t}
              onToggle={() => toggleTask(t.id)}
              onRemove={() => removeTask(t.id)}

    function EditableCustomTask({ task, onToggle, onRemove, onEdit }) {
      const [editing, setEditing] = useState(false);

      const finish = () => { if (editText.trim()) onEdit(editText.trim()); setEditing(false); };

        <div style={{ display:"flex", alignItems:"center", gap:10, padding:"11px 14px", borderRadius:12, background: task.done?"#F1F6F2":COLORS.white, border:`1px solid ${task.done?"#CFE0D4":COLORS.line}`, transition:"background .15s" }}>
          <button onClick={onToggle}
            style={{ all:"unset", cursor:"pointer", width:22, height:22, borderRadius:7, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", background: task.done?COLORS.sage:"transparent", border:`2px solid ${task.done?COLORS.sage:COLORS.line}`, color:"#fff", fontSize:14, fontWeight:700 }}>
            {task.done ? "✓" : ""}
          </button>
          {editing ? (
            <input value={editText} onChange={(e)=>setEditText(e.target.value)} onBlur={finish}

    function WeeklyStats({ reports }) {
      const today = todayStr();
      const ws = getWeekStart(today);
      const week = reports.filter(r => getWeekStart(r.date) === ws);
      if (!week.length) return null;
      const mkt = week.filter(r => r.person === "marketer");
      const ops = week.filter(r => r.person === "operations");
      const sum = (arr, key) => arr.reduce((s,r) => s + (Number(r.daily?.[key])||0), 0);
      const avgPct = Math.round(week.reduce((s,r) => {
        const cfg = TASKS[r.person];
        return s + cfg.daily.filter(t => isDone(t, r.daily?.[t.id])).length / cfg.daily.length * 100;
      }, 0) / week.length);
      const stats = [
        { label:"Products Made", val:sum(ops,"o_d1"), color:COLORS.sage },
        { label:"Deliveries", val:sum(ops,"o_d2"), color:COLORS.sage },
        { label:"Customer Replies", val:sum(mkt,"m_d3"), color:COLORS.clay },
        { label:"Customer Reach", val:sum(mkt,"m_d4"), color:COLORS.clay },
        { label:"Avg Completion", val:`${avgPct}%`, color:COLORS.ink },
      ];
      return (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))", gap:8, marginBottom:20 }}>
          {stats.map(s => (
            <div key={s.label} style={{ background:COLORS.white, border:`1px solid ${COLORS.line}`, borderRadius:12, padding:"12px 14px" }}>
              <p style={{ margin:"0 0 4px", fontSize:11, color:COLORS.inkSoft, textTransform:"uppercase", letterSpacing:"0.05em", fontWeight:600 }}>{s.label}</p>
              <p style={{ margin:0, fontFamily:"'Fraunces', serif", fontSize:24, fontWeight:700, color:s.color }}>{s.val}</p>
            </div>
          ))}
        </div>
      );
    }

    function WeeklyRecap({ reports }) {
      const today = todayStr();
      const ws = getWeekStart(today);
      const weekDays = getWeekDays(ws);
      const pastDays = weekDays.filter(d => d <= today);
      const persons = [["marketer","Marketer",COLORS.clay],["operations","Operations",COLORS.sage]];
      return (
        <div style={{ background:COLORS.white, border:`1px solid ${COLORS.line}`, borderRadius:16, padding:"16px 18px", marginBottom:20 }}>
          <p style={{ fontFamily:"'Fraunces', serif", fontSize:16, fontWeight:600, margin:"0 0 14px" }}>

          </p>
          {persons.map(([person, label, color]) => {
            const submitted = weekDays.filter(d => reports.some(r => r.person === person && r.date === d));
            const missed = pastDays.filter(d => !submitted.includes(d));
            return (
              <div key={person} style={{ marginBottom:12 }}>

                  {missed.length > 0 && <span style={{ fontSize:12, color:COLORS.clay }}>missed: {missed.map(d => { const [y,mo,dy] = d.split("-").map(Number); return FULL_DAYS[new Date(y,mo-1,dy).getDay()]; }).join(", ")}</span>}
                </div>
                <div style={{ display:"flex", gap:3 }}>

                    const sub = submitted.includes(d);
                    const future = d > today;
                    return <div key={d} style={{ flex:1, height:8, borderRadius:4, background:future?COLORS.paper2:sub?color:COLORS.line }} />;
                  })}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function MonthCalendar({ reports }) {
      const today = todayStr();
      const [y, mo] = today.split("-").map(Number);
      const firstDow = new Date(y, mo-1, 1).getDay();
      const daysInMonth = new Date(y, mo, 0).getDate();
      const monthLabel = new Date(y, mo-1, 1).toLocaleDateString(undefined, { month:"long", year:"numeric" });
      const days = Array.from({length:daysInMonth}, (_,i) => {
        const day = i+1;
        return `${y}-${String(mo).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
      });
      const subSet = new Set(reports.map(r => `${r.date}:${r.person}`));
      return (
        <div style={{ background:COLORS.white, border:`1px solid ${COLORS.line}`, borderRadius:16, padding:"16px 18px", marginBottom:20 }}>
          <p style={{ fontFamily:"'Fraunces', serif", fontSize:16, fontWeight:600, margin:"0 0 10px" }}>{monthLabel}</p>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2, marginBottom:6 }}>
            {DAY_LABELS.map((l,i) => <div key={i} style={{ textAlign:"center", fontSize:10, fontWeight:700, color:COLORS.inkSoft, paddingBottom:4 }}>{l}</div>)}
            {Array.from({length:firstDow}, (_,i) => <div key={`e${i}`} />)}
            {days.map(date => {
              const mkt = subSet.has(`${date}:marketer`);
              const ops = subSet.has(`${date}:operations`);
              const future = date > today;
              const isToday = date === today;
              const day = parseInt(date.split("-")[2]);
              return (
                <div key={date} style={{ borderRadius:6, padding:"3px 2px", textAlign:"center", minHeight:32, background:isToday?COLORS.paper2:COLORS.white, border:`1px solid ${isToday?COLORS.clay:COLORS.line}` }}>
                  <p style={{ margin:"0 0 3px", fontSize:10, fontWeight:isToday?700:400, color:isToday?COLORS.clay:COLORS.inkSoft }}>{day}</p>
                  <div style={{ display:"flex", gap:2, justifyContent:"center" }}>
                    <div style={{ width:5, height:5, borderRadius:"50%", background:future?COLORS.paper2:mkt?COLORS.clay:COLORS.line }} />
                    <div style={{ width:5, height:5, borderRadius:"50%", background:future?COLORS.paper2:ops?COLORS.sage:COLORS.line }} />
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ display:"flex", gap:12, marginTop:4 }}>
            {[["Marketer",COLORS.clay],["Operations",COLORS.sage]].map(([lbl,col]) => (
              <div key={lbl} style={{ display:"flex", alignItems:"center", gap:5 }}>
                <div style={{ width:7, height:7, borderRadius:"50%", background:col }} />
                <span style={{ fontSize:11, color:COLORS.inkSoft }}>{lbl}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function TaskItem({ task, value, onChange, label, onLabelChange }) {

    function ChartWidget({ type, labels, datasets, options, height }) {
      const ref = useRef(null);

                {[
                  {label:"Total Capital In",  val:tk(599102), c:"#6B9AB8"},
                  {label:"Salary Drawn",      val:tk(360000), c:"#E8A838"},
                  {label:"Net Cash Flow",     val:tk(389732), c:"#4F7060"},
                ].map(k=>(
                  <div key={k.label} style={{ background:COLORS.white, border:`1px solid ${COLORS.line}`, borderRadius:14, padding:"16px 18px", borderTop:`3px solid ${k.c}` }}>
                    <p style={{ margin:"0 0 6px", fontSize:11, color:COLORS.inkSoft, textTransform:"uppercase", letterSpacing:"0.05em", fontWeight:600 }}>{k.label}</p>
                    <p style={{ margin:0, fontFamily:"'Fraunces',serif", fontSize:22, fontWeight:700, color:COLORS.ink }}>{k.val}</p>
                  </div>
                ))}
              </div>
              <div style={{ background:COLORS.white, border:`1px solid ${COLORS.line}`, borderRadius:16, overflow:"hidden" }}>
                <div style={{ padding:"14px 18px", borderBottom:`1px solid ${COLORS.line}` }}>
                  <p style={{ fontFamily:"'Fraunces',serif", fontSize:15, fontWeight:600, margin:0 }}>Capital & Funding (BDT)</p>
                </div>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13.5 }}>
                  <tbody>
                    {D.capital.map((r,i)=>(
                      <tr key={i} style={{ background:r.bold?COLORS.paper2:i%2===0?COLORS.white:COLORS.paper }}>
                        <td style={{ padding:"12px 18px", color:COLORS.ink, fontWeight:r.bold?700:400, borderBottom:`1px solid ${COLORS.line}` }}>{r.src}</td>
                        <td style={{ padding:"12px 18px", textAlign:"right", fontFamily:"'Fraunces',serif", fontWeight:700, fontSize:r.bold?17:14, color:r.bold?COLORS.sage:COLORS.ink, borderBottom:`1px solid ${COLORS.line}` }}>{tk(r.amt)}</td>
                        <td style={{ padding:"12px 18px", color:COLORS.inkSoft, fontSize:12, borderBottom:`1px solid ${COLORS.line}` }}>{r.note}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );
    }


    function CustomerReportView({ entries, setEntries, setSaved }) {
      const MAX = 30;
      const topic = "Litter";
      const filled = entries.filter(e => e.review && e.review.trim()).length;

      const addEntry = () => {
        if (entries.length >= MAX) return;
        setEntries(p => [...p, { id: Date.now().toString(), customer: "", review: "" }]);
        setSaved(false);
      };
      const updateEntry = (id, field, val) => {
        setEntries(p => p.map(e => e.id === id ? {...e, [field]: val} : e));
        setSaved(false);
      };
      const removeEntry = (id) => {
        setEntries(p => p.filter(e => e.id !== id));
        setSaved(false);
      };

      return (
        <div>
          <div style={{ background:COLORS.white, border:`1px solid ${COLORS.line}`, borderRadius:16, padding:"16px 18px", marginBottom:20 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8, marginBottom:6 }}>
              <div>
                <p style={{ fontFamily:"'Fraunces', serif", fontSize:18, fontWeight:600, margin:"0 0 2px" }}>Customer Feedback Report</p>
                <p style={{ margin:0, fontSize:13, color:COLORS.inkSoft }}>Topic: <span style={{ fontWeight:600, color:COLORS.clay }}>{topic}</span> · Call each customer and log their review or suggestion</p>
              </div>
              <span style={{ fontFamily:"'Fraunces', serif", fontSize:22, fontWeight:700, color: filled===MAX?COLORS.sage:COLORS.clay }}>{filled}<span style={{ fontSize:14, fontWeight:500, color:COLORS.inkSoft }}>/{MAX}</span></span>
            </div>
            <div style={{ height:6, background:COLORS.paper2, borderRadius:999, overflow:"hidden", marginTop:10 }}>
              <div style={{ height:"100%", width:`${(entries.length/MAX)*100}%`, background: filled===MAX?COLORS.sage:COLORS.clay, transition:"width .3s" }} />
            </div>
          </div>

          <div style={{ display:"grid", gap:10, marginBottom:14 }}>
            {entries.map((e, i) => {
              const hasFeedback = e.review && e.review.trim();
              return (
                <div key={e.id} style={{ padding:"14px 16px", borderRadius:14, background: hasFeedback?"#F1F6F2":COLORS.white, border:`1px solid ${hasFeedback?"#CFE0D4":COLORS.line}` }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                    <span style={{ fontSize:11, fontWeight:700, color:COLORS.inkSoft, background:COLORS.paper2, padding:"2px 7px", borderRadius:6, flexShrink:0 }}>#{i+1}</span>
                    <input value={e.customer} placeholder="Customer name or phone…"
                      onChange={ev => updateEntry(e.id, "customer", ev.target.value)}
                      style={{ flex:1, padding:"7px 10px", borderRadius:8, border:`1px solid ${COLORS.line}`, fontSize:14, fontFamily:"inherit", color:COLORS.ink, background:COLORS.white, outline:"none" }} />
                    <button onClick={() => removeEntry(e.id)}
                      style={{ all:"unset", cursor:"pointer", width:26, height:26, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, color:COLORS.inkSoft, lineHeight:1, borderRadius:6 }}>×</button>
                  </div>
                  <textarea value={e.review} placeholder="What did they say about litter? Any review or suggestion…" rows={2}
                    onChange={ev => updateEntry(e.id, "review", ev.target.value)}
                    style={{ width:"100%", resize:"vertical", padding:"9px 11px", borderRadius:9, border:`1px solid ${COLORS.line}`, fontSize:14, color:COLORS.ink, fontFamily:"inherit", background:COLORS.white, outline:"none" }} />
                </div>
              );
            })}
          </div>

          {entries.length < MAX ? (
            <button onClick={addEntry}
              style={{ all:"unset", cursor:"pointer", display:"block", width:"100%", padding:"13px 18px", borderRadius:12, border:`2px dashed ${COLORS.line}`, textAlign:"center", fontSize:14, fontWeight:600, color:COLORS.inkSoft, background:COLORS.white, boxSizing:"border-box" }}>
              + Add Customer · {entries.length}/{MAX}
            </button>
          ) : (
            <div style={{ textAlign:"center", fontSize:14, color:COLORS.sage, fontWeight:700, padding:"14px", background:"#EAF1EC", borderRadius:12, border:`1px solid #CFE0D4` }}>
              All 30 customers added!
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
